<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veículos</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de Veículos</h1>

        <form id="formVeiculo">

            <input type="text" id="placa" placeholder="Placa" required>

            <input type="text" id="modelo" placeholder="Modelo" required>

            <input type="text" id="marca" placeholder="Marca" required>

            <input type="number" id="ano" placeholder="Ano">

            <input type="text" id="cor" placeholder="Cor">

            <input type="number" step="0.01" id="valorHora" placeholder="Valor Hora" required>

            <button type="submit">
                Cadastrar Veículo
            </button>

        </form>

        <hr>

        <h2>Lista de Veículos</h2>

        <div id="listaVeiculos"></div>

        <a class="voltar" href="index.html">
            ← Voltar
        </a>

    </div>

    <script src="script.js"></script>

</body>
</html>
